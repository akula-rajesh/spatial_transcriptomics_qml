# ============================================================
# Pipeline Config — QNN Gene Predictor V2 — PHASE 1
# Quantum Training  [v2 — tuned after 20260328 run analysis]
# ============================================================
#
# WHAT PHASE 1 DOES:
#   Classical components are FROZEN. Only QNN weights learn:
#     qnn_layer.weights  shape (3, 4, 3) = 36 parameters
#   Purpose: quantum circuit adapts to fixed classical representations
#   from Phase 0 without them moving underneath it.
#
# CHANGES vs original Phase 1 (based on 20260328 results):
#   ⬆ n_layers:          2  →  3  (must match Phase 0 checkpoint)
#   ⬆ weight_decay: 0.00001 → 0.0001
#   ⬆ dropout:         0.3  → 0.5  (must match Phase 0 checkpoint)
#   ⬆ epochs:           15  → 20   (QNN was flat all 15 epochs — needs more time)
#   ⬆ local_loss_weight: 0.1 → 0.3 (stronger PCA supervision to escape plateau)
#   ⬆ finetuning: "frozen" → "ftconv" (must match Phase 0 architecture)
#   ✦ early_stopping_delta: 0.001   (only stop on real improvement)
#
# WHAT TRAINS:
#   ✅ qnn_layer.weights  (36 quantum params — only thing learning)
#   ❌ feature_reducer    (frozen — preserves Phase 0 output)
#   ❌ decoder            (frozen — preserves Phase 0 output)
#   ❌ main_head          (frozen — preserves Phase 0 output)
#   ❌ backbone           (frozen — preserves Phase 0 ftconv state)
#
# PREREQUISITE:
#   Complete Phase 0 first. Set resume_path below to Phase 0 best model.
#   Look in: results/<phase0_experiment_id>/models/qnn_gene_predictor_v2_best.pth
#
# RUN COMMAND:
#   python src/main.py \
#     --config config/pipeline_config_qnn_v2_phase1.yaml \
#     --mode train
#
# NEXT STEP:
#   Use best model from this phase as resume_path in phase2 config.
# ============================================================

# ── Pipeline steps ────────────────────────────────────────────────────────────
pipeline:
  download_data:  false
  data_loader:    "spatial_downloader"

  process_data: false
  processing_steps:
    - name: "spatial_file_organizer"
      enabled: true
    - name: "spatial_gene_processor"
      enabled: true
    - name: "spatial_stain_normalizer"
      enabled: true
    - name: "spatial_patch_extractor"
      enabled: true

  train_model:     true
  evaluate_model:  false
  compare_results: false

# ── Data download ─────────────────────────────────────────────────────────────
download:
  url:         "https://data.mendeley.com/public-api/zip/29ntw7sh4r/download/5"
  remove_zip:  true
  chunk_size:  1024
  max_retries: 3
  timeout:     300

# ── Data paths ────────────────────────────────────────────────────────────────
data:
  input_dir:          "data/input/"
  processed_dir:      "data/processed/"
  train_dir:          "data/train/"
  test_dir:           "data/test/"
  metadata_file:      "metadata.csv"
  verify_ssl:         false

  stbc_dir:           "data/stbc/"
  raw_dir:            "data/raw/"
  organized_dir:      "data/organized/"
  count_filtered_dir: "data/processed/count_filtered/"
  stained_dir:        "data/stained/"
  train_counts_dir:   "data/train/counts/"
  train_images_dir:   "data/train/images/"
  test_counts_dir:    "data/test/counts/"
  test_images_dir:    "data/test/images/"

  # ── Test patient split ────────────────────────────────────────────────────
  # THIS IS THE AUTHORITATIVE FIELD — all code reads data.test_patient
  # (data_generator.py, supervised_trainer.py, spatial_patch_extractor.py)
  #
  # The patient listed here is held out ENTIRELY from training:
  #   • Its patches come from data/test/counts/ and data/test/images/
  #   • All remaining patients from data/train/ become the training set
  #   • Normalization stats (image mean/std, gene mean/std) are computed
  #     on training patients ONLY — test patient never seen during stats
  #
  # To change the test patient, edit ONLY this field.
  # Do NOT edit split.test_patients below — that section is not read by code.
  test_patient: "BC23209"

# ── Results ───────────────────────────────────────────────────────────────────
results:
  base_dir:               "results/"
  experiment_naming:      "timestamp"
  save_model_checkpoints: true
  save_predictions:       true
  save_logs:              true

# ── Training — Phase 1: Quantum Training ─────────────────────────────────────
training:
  epochs:    20             # ⬆ was 15 — QNN loss was flat all 15 epochs on 20260328
  cv_epochs: 10
  cv_folds:  5
  use_cv:    false

  optimizer:     "adam"
  lr:            0.005      # ⬆ was 0.001 — QNN needs a bigger lr to escape flat region
                            # Adam will scale this per-parameter via moments
  learning_rate: 0.005
  momentum:      0.9        # Unused by Adam
  weight_decay:  0.0001     # ⬆ was 0.00001

  scheduler:    "cosine"
  cosine_t_max: 5

  batch_size:   8           # 36 params × param-shift = 72 circuit evals per batch
  num_workers:  4
  shuffle:      true
  debug:        false

  early_stopping_patience: 15  # QML convergence is noisy — be patient
  early_stopping_delta:    0.001 # Only stop on real improvement

  validation_metric: "loss"
  pred_root:         "results/predictions/"

  # ⚠️  SET THIS to your Phase 0 best model path before running
  # Example: "results/experiment_YYYYMMDD_HHMMSS/YYYYMMDD_HHMMSS/models/qnn_gene_predictor_v2_best.pth"
  resume_path: "results/experiment_20260331_235552/20260331_235552/models/qnn_gene_predictor_v2_final.pth"         # ← REQUIRED: paste Phase 0 best model path here

# ── Cross-validation ──────────────────────────────────────────────────────────
cross_validation:
  folds:        5
  type:         "kfold"
  shuffle:      true
  random_state: 42

# ── Model settings — Phase 1 ─────────────────────────────────────────────────
model:
  gene_filter:  250
  aux_ratio:    0.0
  aux_weight:   0.0
  pretrained:   true
  finetuning:   "ftconv"    # Must match Phase 0 — backbone partially unfrozen
                            # (frozen by PhaseController during Phase 1, but
                            #  architecture must match the loaded checkpoint)

  # ── QNN circuit (MUST be identical across all 3 phases) ──────────────────
  n_qubits:        4        # 4 qubits → gradient scale ≈ 1/16
  n_layers:        3        # ⬆ was 2 — must match Phase 0 checkpoint
  reduce_dim:      256      # Must match Phase 0
  decode_dim:      512      # Must match Phase 0
  reducer_dropout: 0.5      # Must match Phase 0 checkpoint
  decoder_dropout: 0.5      # Must match Phase 0 checkpoint
  q_device:        "auto"
  init_noise:      0.01     # Irrelevant in Phase 1 (weights loaded from Phase 0)

  # Phase 1: local quantum loss gives direct supervision signal to QNN output
  # PCA projects 250 gene targets → 4 qubits dims and supervises QNN directly
  # This is the main tool for escaping the barren plateau in Phase 1
  local_quantum_loss: true  # ✅ Enable — critical for QNN to learn
  local_loss_weight:  0.3   # ⬆ was 0.1 — stronger signal needed (QNN was flat)

  training_phase: 1         # 1 = Quantum training only

  total_genes: null         # Set automatically from dataset at runtime

# ── Active model ──────────────────────────────────────────────────────────────
models:
  active_model:   "qnn_gene_predictor_v2"
  model_config:   "qnn_gene_predictor_v2"
  save_best_only: true

# ── Data split — HOW IT ACTUALLY WORKS ──────────────────────────────────────
# The train/test split is driven entirely by data.test_patient above.
# The 'split.test_patients' list below is NOT read by any code.
# It is kept only for documentation. Edit data.test_patient to change the split.
split:
  # For reference only — NOT read by code. Edit data.test_patient instead.
  test_patients:
    - "BC23450"       # Currently held-out patient
  # Remaining ~22 patients become training patients automatically:
  # BC23209, BC23268, BC23269, BC23270, BC23272, BC23277, BC23287, BC23288,
  # BC23377, BC23506, BC23508, BC23567, BC23803, BC23810, BC23895, BC23901,
  # BC23903, BC23944, BC24044, BC24105, BC24220, BC24223

# ── Gene filtering ────────────────────────────────────────────────────────────
gene_expression:
  min_total_reads:        1000
  min_expression_percent: 0.10
  top_genes_to_predict:   250

# ── Preprocessing ─────────────────────────────────────────────────────────────
preprocessing:
  window_size:        299
  quality_threshold:  1000
  sparsity_threshold: 0.10

spatial:
  patch_window_size: 299
  patch_resolution:  224

# ── Execution ─────────────────────────────────────────────────────────────────
execution:
  seed:             42
  gpu_enabled:      true
  cuda_enabled:     true
  mps_enabled:      true
  max_image_pixels: 1000000000
