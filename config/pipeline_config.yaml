# Main pipeline configuration
pipeline:
  download_data: false
  # Data loader selection - using spatial downloader for BRSTNet pipeline
  data_loader: "spatial_downloader"

  process_data: false
  # Processing steps - BRSTNet sequential pipeline
  processing_steps:
    - name: "spatial_file_organizer"
      enabled: true
    - name: "spatial_gene_processor"
      enabled: true
    - name: "spatial_stain_normalizer"
      enabled: true
    - name: "spatial_patch_extractor"
      enabled: true

  train_model: true
  evaluate_model: true
  compare_results: false

# Download configuration
download:
  url: "https://data.mendeley.com/public-api/zip/29ntw7sh4r/download/5"
  remove_zip: true
  chunk_size: 1024
  max_retries: 3
  timeout: 300

# Data paths (can be absolute or relative)
data:
  input_dir: "data/input/"
  processed_dir: "data/processed/"
  train_dir: "data/train/"
  test_dir: "data/test/"
  metadata_file: "metadata.csv"
  verify_ssl: false  # Set to false if behind corporate proxy or with self-signed certificates

  # Spatial pipeline-specific paths
  stbc_dir: "data/stbc/"  # Organized files by subtype/patient
  raw_dir: "data/raw/"
  organized_dir: "data/organized/"
  count_filtered_dir: "data/processed/count_filtered/"
  stained_dir: "data/stained/"
  train_counts_dir: "data/train/counts/"
  train_images_dir: "data/train/images/"
  test_counts_dir: "data/test/counts/"
  test_images_dir: "data/test/images/"

  # Test patient configuration
  test_patient: "BC23450"  # Patient ID to hold out for testing

# Results storage
results:
  base_dir: "results/"
  experiment_naming: "timestamp"  # Options: timestamp, custom
  save_model_checkpoints: true
  save_predictions: true
  save_logs: true

# Training — SGD + CosineAnnealingLR matching paper exactly
training:
  epochs: 30
  cv_epochs: 30                  # Epochs per CV fold
  cv_folds: 5                     # Paper default: 5-fold CV
  use_cv: false                   # Set true to run CV epoch selection

  # Optimizer: SGD (paper default)
  optimizer: "sgd"
  lr: 0.0005                       # Paper: 1e-3
  learning_rate: 0.001            # alias used by some callers
  momentum: 0.9                   # Paper: 0.9
  weight_decay: 0.000001          # Paper: 1e-6

  # LR Scheduler: CosineAnnealingLR (paper default)
  scheduler: "cosine"
  cosine_t_max: 5                 # Paper: T_max=5

  batch_size: 32
  num_workers: 8
  shuffle: true
  debug: false

  early_stopping_patience: 20    # Paper's EarlyStopping default
  early_stopping_delta: 0.0

  validation_metric: "loss"      # Options: loss, amae, armse, correlation_coefficient
  pred_root: "results/predictions/"

  # Resume training from a previously saved checkpoint.
  # Set to null to start fresh, or provide a path like:
  #   resume_path: "results/experiment_20260319_220858/20260319_220858/models/classical_efficientnet_final.pth"
  # CLI --resume flag takes priority over this setting.
  resume_path: results/experiment_20260320_152035/20260320_152035/models/classical_efficientnet_final.pth

# Cross-validation configuration
cross_validation:
  folds: 5
  type: "kfold"  # Options: kfold, stratified
  shuffle: true
  random_state: 42

# Model
model:
  gene_filter: 250
  aux_ratio: 0
  aux_weight: 0                 # Paper: aux_weight = 1
  pretrained: true
  finetuning: "ftall"             # ftfc | ftconv | ftall | null
  total_genes: null               # Set automatically at runtime

# Model selection (orchestrator)
models:
  active_model: "classical_efficientnet"  # Default model to run
  compare_models:
    - "classical_efficientnet"
    - "quantum_amplitude_embedding"
    - "efficientnet_quantum_head"
  save_best_only: true

# Data splitting
split:
  test_patients:
    - "BC23450"
    - "BC23903"
  validation_ratio: 0.2

# Gene expression filtering
gene_expression:
  min_total_reads: 1000
  min_expression_percent: 0.10  # Expressed in at least 10% of spots
  top_genes_to_predict: 250

# Preprocessing  — paper uses window=299, patches resized to 224
preprocessing:
  window_size: 299                # Paper default: 299 (NOT 224)
  quality_threshold: 1000
  sparsity_threshold: 0.10

# Spatial processing
spatial:
  patch_window_size: 299
  patch_resolution: 224

# Execution control
execution:
  seed: 0
  gpu_enabled: true            # Enable GPU acceleration (CUDA or MPS)
  cuda_enabled: true           # Enable NVIDIA CUDA GPU if available
  mps_enabled: true            # Enable Apple Metal Performance Shaders (Mac GPU) if available
  max_image_pixels: 1000000000
