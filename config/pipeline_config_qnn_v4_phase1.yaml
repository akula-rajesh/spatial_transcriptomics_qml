# ============================================================
# V4 Phase 1 — Quantum Kernel Alignment Training
# Only quantum circuit parameters θ are trainable.
# Backbone and feature reducer are frozen.
#
# Run:
#   python src/main.py \
#     --config config/pipeline_config_qnn_v4_phase1.yaml \
#     --resume results/<phase0_experiment>/models/qnn_gene_predictor_v4_final.pth \
#     --mode train
#
# Goal: train quantum kernel circuit to align K with K* (gene similarity).
# After completion, use checkpoint as --resume for phase 2.
# ============================================================

pipeline:
  download_data:   false
  process_data:    false
  train_model:     true
  evaluate_model:  false
  compare_results: false

data:
  train_counts_dir:  "data/train/counts/"
  train_images_dir:  "data/train/images/"
  test_counts_dir:   "data/test/counts/"
  test_images_dir:   "data/test/images/"
  # THIS IS THE AUTHORITATIVE FIELD — all code reads data.test_patient
  test_patient:      "BC23209"

results:
  base_dir:               "results/"
  experiment_naming:      "timestamp"
  save_model_checkpoints: true
  save_predictions:       false
  save_logs:              true

training:
  epochs:       15              # Kernel alignment converges quickly
  optimizer:    "adam"
  lr:           0.0001          # Very low LR — quantum gradients are tiny
  weight_decay: 0.000001        # 1e-6: minimal regularisation
  scheduler:    "cosine"
  cosine_t_max: 5
  batch_size:   16              # Small batch → fewer kernel entries per step
  num_workers:  4
  shuffle:      true
  early_stopping_patience: 10
  early_stopping_delta:    0.0
  validation_metric: "loss"
  pred_root:    "results/predictions/"
  resume_path:  null            # Set via --resume CLI argument

  # V4-specific: alignment loss weight
  # Phase 1: heavy alignment supervision → high weight
  kernel_loss_weight: 0.7

model:
  gene_filter:         250
  aux_ratio:           0.0      # Disabled for V4
  aux_weight:          0.0
  pretrained:          true
  finetuning:          "ft2"
  n_qubits:            4
  n_layers:            2
  embedding_type:      "angle"  # angle | iqp | amplitude
  q_device:            "default.qubit"
  init_noise:          0.01

  # Kernel alignment
  target_kernel_type:  "rbf"
  rbf_sigma:           1.0
  center_kernel:       true
  kernel_loss_weight:  0.7      # Phase 1: align kernel heavily

  # KRR head
  ridge_lambda:        0.001
  n_landmarks:         0
  use_nystrom:         false

  # Residual correction head
  residual_correction:  true
  residual_hidden_dim:  128
  residual_dropout:     0.2

  # Feature reducer
  reduce_dim:          256
  decode_dim:          256
  reducer_dropout:     0.2

  # ← Phase 1: only quantum kernel θ trainable, all else frozen
  training_phase:      1
  total_genes:         null     # Auto-resolved from dataset at runtime

models:
  active_model:   "qnn_gene_predictor_v4"
  save_best_only: true

preprocessing:
  window_size:         299      # Paper default: 299
  quality_threshold:   1000
  sparsity_threshold:  0.10

split:
  # For reference only — NOT read by code. Edit data.test_patient instead.
  test_patients:
    - "BC23209"
