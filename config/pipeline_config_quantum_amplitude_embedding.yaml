# ============================================================
# Pipeline Configuration — Quantum Amplitude Embedding
# ============================================================
# Model   : EfficientNet-B4 → Linear(1792→2^n) → AmplitudeEmbedding
#           → StronglyEntanglingLayers → PauliZ(n) → gene heads
# Hardware : MPS / CUDA / CPU (quantum circuit always on CPU via PennyLane)
#
# NOTE: This model has a rank bottleneck (output rank ≤ n_qubits).
#       Recommended for: quick tests, debugging, understanding QML basics.
#       NOT recommended for: final research results.
#       Use qnn_gene_predictor for serious QML-vs-classical comparison.
#
# Usage:
#   python src/main.py \
#     --config config/pipeline_config_quantum_amplitude_embedding.yaml \
#     --mode train
# ============================================================

# ── Pipeline steps ───────────────────────────────────────────────────────────
pipeline:
  download_data:  false
  data_loader:    "spatial_downloader"

  process_data: false
  processing_steps:
    - name: "spatial_file_organizer"
      enabled: true
    - name: "spatial_gene_processor"
      enabled: true
    - name: "spatial_stain_normalizer"
      enabled: true
    - name: "spatial_patch_extractor"
      enabled: true

  train_model:    true
  evaluate_model: true
  compare_results: false

# ── Data download ─────────────────────────────────────────────────────────────
download:
  url:        "https://data.mendeley.com/public-api/zip/29ntw7sh4r/download/5"
  remove_zip: true
  chunk_size: 1024
  max_retries: 3
  timeout:    300

# ── Data paths ────────────────────────────────────────────────────────────────
data:
  input_dir:          "data/input/"
  processed_dir:      "data/processed/"
  train_dir:          "data/train/"
  test_dir:           "data/test/"
  metadata_file:      "metadata.csv"
  verify_ssl:         false

  stbc_dir:           "data/stbc/"
  raw_dir:            "data/raw/"
  organized_dir:      "data/organized/"
  count_filtered_dir: "data/processed/count_filtered/"
  stained_dir:        "data/stained/"
  train_counts_dir:   "data/train/counts/"
  train_images_dir:   "data/train/images/"
  test_counts_dir:    "data/test/counts/"
  test_images_dir:    "data/test/images/"

  test_patient: "BC23450"

# ── Results ───────────────────────────────────────────────────────────────────
results:
  base_dir:              "results/"
  experiment_naming:     "timestamp"
  save_model_checkpoints: true
  save_predictions:      true
  save_logs:             true

# ── Training ─────────────────────────────────────────────────────────────────
# Amplitude embedding is the simplest quantum model (fewest circuit params).
# parameter-shift: 2 × n_qubits × n_layers × 3 = 2×3×2×3 = 36 evals per step.
# Can use larger batch_size than other quantum models.
training:
  epochs:    20
  cv_epochs: 20
  cv_folds:  5
  use_cv:    false

  optimizer:    "sgd"
  lr:           0.001
  learning_rate: 0.001
  momentum:     0.9
  weight_decay: 0.000001

  scheduler:    "cosine"
  cosine_t_max: 5

  # batch_size can be larger than QNN models — fewer circuit evals per step
  batch_size:   16
  num_workers:  4
  shuffle:      true
  debug:        false

  early_stopping_patience: 10
  early_stopping_delta:    0.0

  validation_metric: "loss"
  pred_root:         "results/predictions/"
  resume_path:       null

# ── Cross-validation ──────────────────────────────────────────────────────────
cross_validation:
  folds:        5
  type:         "kfold"
  shuffle:      true
  random_state: 42

# ── Model settings ────────────────────────────────────────────────────────────
model:
  gene_filter: 250
  aux_ratio:   0.0             # No aux head — model already limited by rank bottleneck
  aux_weight:  0.0
  pretrained:  true
  finetuning:  "ftall"         # Fine-tune full backbone
  total_genes: null

  # Amplitude embedding circuit parameters
  # n_qubits=3 → circuit outputs 3 values → rank-3 bottleneck
  # Increase n_qubits to reduce bottleneck (but simulation gets exponentially slower)
  n_qubits:  3                 # Default: 3. Try 4 or 5 for more expressibility.
  n_layers:  2                 # VQC depth (StronglyEntanglingLayers count)
  q_device:  "default.qubit"  # PennyLane device

# ── Active model ──────────────────────────────────────────────────────────────
models:
  active_model: "quantum_amplitude_embedding"
  save_best_only: true

# ── Data split ────────────────────────────────────────────────────────────────
split:
  test_patients:
    - "BC23450"
  validation_ratio: 0.2

# ── Gene filtering ────────────────────────────────────────────────────────────
gene_expression:
  min_total_reads:        1000
  min_expression_percent: 0.10
  top_genes_to_predict:   250

# ── Preprocessing ─────────────────────────────────────────────────────────────
preprocessing:
  window_size:        299
  quality_threshold:  1000
  sparsity_threshold: 0.10

spatial:
  patch_window_size: 299
  patch_resolution:  224

# ── Execution ─────────────────────────────────────────────────────────────────
execution:
  seed:             42
  gpu_enabled:      true
  cuda_enabled:     true
  mps_enabled:      true
  max_image_pixels: 1000000000
